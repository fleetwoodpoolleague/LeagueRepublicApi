name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 5'  # Every Friday at 09:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.202'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-restore --no-build --output ./publish

      - name: Generate ICS files
        run: |
          chmod +x ./publish/LeagueRepublicConsole
          ./publish/LeagueRepublicConsole ics "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Cons A"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Kings Own Comrades"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "The Ashley"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Strawberry B"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "The Bug B"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Gardeners Vets"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Sherelles A"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Bar 1"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Wings Club"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Gardeners Arms"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Strawberry Gardens"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Royal Oak A"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "The Bug A"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Rossall Tavern"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Tee Time Social Club"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Top Club"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Working Mens Club"
          ./publish/LeagueRepublicConsole team "${{ secrets.LEAGUE_ID }}" --league-name "Fleetwood Pool League" --team-name "Fleetwood Cons B"

      - name: Push ICS files to target repository
        env:
          TARGET_REPO_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          TARGET_REPO="fleetwoodpoolleague/Fixtures"
          TARGET_DIR="ics"
          BRANCH="main"

          git config --global user.name "eightball[bot]"
          git config --global user.email "eightball[bot]@users.noreply.github.com"

          git clone --depth=1 https://x-access-token:${TARGET_REPO_TOKEN}@github.com/${TARGET_REPO}.git target-repo
          cd target-repo

          mkdir -p "${TARGET_DIR}"
          rm -f ${TARGET_DIR}/*.ics 2>/dev/null || true
          cp ../*.ics "${TARGET_DIR}/" || true

          git add "${TARGET_DIR}/"
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update generated ICS files from CI"
            git push origin ${BRANCH}
          fi

      - name: Update fylde8ball data
        env:
          FYLDE_REPO_TOKEN: ${{ secrets.FYLDE_EIGHTBALL }}
        run: |
          TARGET_REPO="fleetwoodpoolleague/fylde8ball"
          BRANCH="main"

          git clone --depth=1 https://x-access-token:${FYLDE_REPO_TOKEN}@github.com/${TARGET_REPO}.git fylde8ball-repo

          ./publish/LeagueRepublicConsole update ./fylde8ball-repo/src/data/tournaments

          cd fylde8ball-repo
          git add src/data/tournaments
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update generated data files from CI"
            git push origin ${BRANCH}
          fi
